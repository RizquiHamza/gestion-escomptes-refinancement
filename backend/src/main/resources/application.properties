spring.application.name=gestion_financement

# ============================================================
# Configuration MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_financement?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=PAPAmama2016
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Jackson (dates au format ISO)
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# ============================================================
# Serveur
# ============================================================
server.port=8080

# ============================================================
# JWT Security
# ============================================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ============================================================
# Logging
# ============================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example=INFO
logging.level.org.springframework.security=INFO

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.filter=true
